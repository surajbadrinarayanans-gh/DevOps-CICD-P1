apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: devops-ingress
spec:
  rules:
  - host: devops.local
    http:
      paths:
      - path: /orders
        pathType: Prefix
        backend:
          service:
            name: order-service
            port:
              number: 3001
      - path: /users
        pathType: Prefix
        backend:
          service:
            name: user-service
            port:
              number: 3000