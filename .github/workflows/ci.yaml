name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build user-service image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/user-service:latest ./services/user-service

      - name: Build order-service image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/order-service:latest ./services/order-service

      - name: Push user-service image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/user-service:latest

      - name: Push order-service image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/order-service:latest